name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Build Windows GUI launcher (Hermes.exe) ────────────
  build-exe:
    name: Build Hermes.exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyinstaller
      - name: Build
        working-directory: launcher
        run: pyinstaller Hermes_deploy.spec
      - name: Verify
        run: |
          if (-not (Test-Path launcher\dist\Hermes.exe)) {
            Write-Host "[ERROR] Hermes.exe not found"; exit 1
          }
          $size = [math]::Round((Get-Item launcher\dist\Hermes.exe).Length / 1MB, 1)
          Write-Host "Hermes.exe: $size MB"
      - uses: actions/upload-artifact@v4
        with:
          name: hermes-exe
          path: launcher/dist/Hermes.exe
          retention-days: 1

  # ── Bundle portable Python 3.12 + pre-installed hermes ──
  bundle-python:
    name: Bundle portable Python
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Python 3.12 embeddable
        shell: pwsh
        run: |
          $pyUrl = "https://www.python.org/ftp/python/3.12.10/python-3.12.10-embed-amd64.zip"
          Invoke-WebRequest $pyUrl -OutFile python.zip
          Expand-Archive python.zip -DestinationPath python
          Write-Host "Python embeddable extracted"

      - name: Enable pip in embeddable Python
        shell: pwsh
        run: |
          # Edit python312._pth: uncomment 'import site' and add site-packages
          $pth = "python\python312._pth"
          (Get-Content $pth) -replace '#import site', 'import site' | Set-Content $pth
          Add-Content $pth "Lib\site-packages"
          Write-Host "python312._pth updated"
          # Install pip
          Invoke-WebRequest https://bootstrap.pypa.io/get-pip.py -OutFile get-pip.py
          python\python.exe get-pip.py --no-warn-script-location
          Write-Host "pip installed: $(python\python.exe -m pip --version)"

      - name: Install hermes-agent (portable, non-editable)
        shell: pwsh
        run: |
          # Install build tools first (setuptools needed by pyproject.toml build)
          python\python.exe -m pip install setuptools wheel
          # Try full install first, fall back without pty if needed
          $specs = @(
            "vendor/hermes-agent[messaging,mcp,pty,honcho,cron,cli]",
            "vendor/hermes-agent[messaging,mcp,honcho,cron,cli]"
          )
          $ok = $false
          foreach ($s in $specs) {
            Write-Host "Installing: $s"
            python\python.exe -m pip install "$s" 2>&1
            if ($LASTEXITCODE -eq 0) {
              $ok = $true
              Write-Host "Success: $s"
              break
            }
            Write-Host "Failed ($LASTEXITCODE), trying next option..."
          }
          if (-not $ok) {
            Write-Host "[ERROR] All install attempts failed"
            exit 1
          }

      - name: Replace hardcoded .exe launcher with portable .cmd
        shell: pwsh
        run: |
          $exePath = "python\Scripts\hermes.exe"
          $cmdPath = "python\Scripts\hermes.cmd"
          if (Test-Path $exePath) {
            Remove-Item $exePath -Force
            Write-Host "Removed hermes.exe (hardcoded CI path)"
          }
          # Portable .cmd: uses python.exe relative to Scripts\ (..\python.exe)
          $lines = @(
            '@echo off',
            '"%~dp0..\python.exe" -c "from hermes_cli.main import main; import sys; sys.argv[0]=''hermes''; sys.exit(main())" %*'
          )
          [System.IO.File]::WriteAllLines($cmdPath, $lines, [System.Text.Encoding]::ASCII)
          Write-Host "Created portable hermes.cmd"

      - name: Verify hermes command
        shell: pwsh
        run: |
          # Check .cmd wrapper exists and works
          if (Test-Path "python\Scripts\hermes.cmd") {
            Write-Host "hermes.cmd created"
          } else {
            Write-Host "[ERROR] hermes.cmd not found!"
            Get-ChildItem python\Scripts\
            exit 1
          }
          # Quick smoke test
          $out = & python\python.exe -c "import hermes_cli; print('OK')" 2>&1
          Write-Host "Import test: $out"

      - name: Show bundle stats
        shell: pwsh
        run: |
          $pySize = [math]::Round((Get-ChildItem python -Recurse | Measure-Object Length -Sum).Sum / 1MB, 1)
          Write-Host "Python bundle size: $pySize MB"

      - uses: actions/upload-artifact@v4
        with:
          name: portable-python
          path: python/
          retention-days: 1

  # ── Package and release ────────────────────────────────
  package:
    name: Package and release
    runs-on: ubuntu-latest
    needs: [build-exe, bundle-python]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download Hermes.exe
        uses: actions/download-artifact@v4
        with:
          name: hermes-exe
          path: launcher/

      - name: Download portable Python
        uses: actions/download-artifact@v4
        with:
          name: portable-python
          path: python/

      - name: Verify artifacts
        run: |
          ls -lh launcher/Hermes.exe
          ls python/python.exe python/Scripts/hermes.exe 2>/dev/null || echo "hermes.exe check failed"
          echo "EXE_SIZE=$(ls -lh launcher/Hermes.exe | awk '{print $5}')" >> "$GITHUB_ENV"
          echo "PY_SIZE=$(du -sh python/ | awk '{print $1}')" >> "$GITHUB_ENV"

      # ── Package Windows (zip) ─────────────────────────
      - name: Package Windows zip
        run: |
          PKG="hermes-deploy-windows-${{ steps.version.outputs.VERSION }}"
          mkdir -p "dist/$PKG/windows"
          mkdir -p "dist/$PKG/vendor"
          mkdir -p "dist/$PKG/launcher"

          # Install scripts
          cp install.cmd               "dist/$PKG/"
          cp install.ps1               "dist/$PKG/"
          cp windows/install.ps1       "dist/$PKG/windows/"
          cp windows/install.cmd       "dist/$PKG/windows/"
          cp windows/install-extended.ps1 "dist/$PKG/windows/"

          # Portable Python (Python 3.12 + all deps pre-installed)
          cp -r python                 "dist/$PKG/"

          # Launcher
          cp launcher/Hermes.exe       "dist/$PKG/launcher/"
          cp launcher/icon.ico         "dist/$PKG/launcher/"
          cp launcher/app_icon.png     "dist/$PKG/launcher/"
          cp launcher/install_shortcut.ps1 "dist/$PKG/launcher/"

          # Source (for reference / update)
          cp -r vendor/hermes-agent    "dist/$PKG/vendor/"

          # Docs
          cp README.md                 "dist/$PKG/"

          cd dist
          zip -r "../${PKG}.zip" "$PKG"
          echo "WINDOWS_ZIP=${PKG}.zip" >> "$GITHUB_ENV"

      # ── Package Linux (tar.gz) ─────────────────────────
      - name: Package Linux tar.gz
        run: |
          PKG="hermes-deploy-linux-${{ steps.version.outputs.VERSION }}"
          mkdir -p "dist/$PKG/linux"
          mkdir -p "dist/$PKG/vendor"

          cp install.sh "dist/$PKG/"
          chmod +x "dist/$PKG/install.sh"
          cp linux/install.sh "dist/$PKG/linux/"
          chmod +x "dist/$PKG/linux/install.sh"
          cp -r vendor/hermes-agent "dist/$PKG/vendor/"
          cp README.md "dist/$PKG/"

          cd dist
          tar -czf "../${PKG}.tar.gz" "$PKG"
          echo "LINUX_TARGZ=${PKG}.tar.gz" >> "$GITHUB_ENV"

      # ── Checksums ──────────────────────────────────────
      - name: Generate checksums
        run: |
          sha256sum "$WINDOWS_ZIP" "$LINUX_TARGZ" > checksums.txt
          cat checksums.txt

      # ── Create GitHub Release ───────────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Hermes Agent One-Click Deploy  v${{ steps.version.outputs.VERSION }}

            ### Downloads

            | Platform | File | Notes |
            |----------|------|-------|
            | Windows 10/11 | `${{ env.WINDOWS_ZIP }}` | Portable Python 3.12 + all deps (${{ env.PY_SIZE }}) + GUI launcher (${{ env.EXE_SIZE }}) |
            | Linux / macOS / WSL2 | `${{ env.LINUX_TARGZ }}` | CLI install |

            ### Windows Installation

            ```
            1. Download and extract the zip
            2. Double-click install.cmd
            3. Fill in your API key when notepad opens
            4. Restart terminal, run: hermes
            ```
            **No Python required. No network. No compilation.**
            A complete Python 3.12 environment with all dependencies is bundled inside the zip.
            Works on ANY Windows 10/11 machine, regardless of what is or isn't installed.

            ### Linux / macOS / WSL2 Installation
            ```bash
            tar -xzf ${{ env.LINUX_TARGZ }}
            cd hermes-deploy-linux-${{ steps.version.outputs.VERSION }}
            bash install.sh
            # Reload shell, then: hermes setup
            ```

            ### File Verification (SHA256)

            See attached `checksums.txt`

            ---

            Bundled Hermes Agent version: **v0.12.0**
            Upstream: https://github.com/NousResearch/hermes-agent
          files: |
            ${{ env.WINDOWS_ZIP }}
            ${{ env.LINUX_TARGZ }}
            checksums.txt
          draft: false
          prerelease: false
