name: Release

# Push v* tag to trigger (e.g. v0.12.0)
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Build Windows GUI launcher (Hermes.exe) ────────────
  build-exe:
    name: Build Hermes.exe (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build Hermes.exe
        working-directory: launcher
        run: pyinstaller Hermes_deploy.spec

      - name: Verify artifact
        run: |
          if (Test-Path launcher\dist\Hermes.exe) {
            $size = [math]::Round((Get-Item launcher\dist\Hermes.exe).Length / 1MB, 1)
            Write-Host "Hermes.exe built: $size MB"
          } else {
            Write-Host "[ERROR] Hermes.exe not found!"
            exit 1
          }

      - name: Upload Hermes.exe
        uses: actions/upload-artifact@v4
        with:
          name: hermes-exe
          path: launcher/dist/Hermes.exe
          retention-days: 1

  # ── Bundle offline wheels + uv.exe ─────────────────────
  bundle-offline:
    name: Bundle offline wheels + uv
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download all wheels
        shell: pwsh
        run: |
          Set-Location vendor/hermes-agent
          pip download ".[messaging,mcp,honcho,cron,cli]" -d ../../wheels/

      - name: Download uv.exe standalone
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/astral-sh/uv/releases/latest/download/uv-x86_64-pc-windows-msvc.exe" -OutFile uv.exe
          Write-Host "uv.exe size: $((Get-Item uv.exe).Length / 1MB) MB"

      - name: Show bundle stats
        shell: pwsh
        run: |
          $wheelCount = (Get-ChildItem wheels/*.whl).Count
          $wheelSize = [math]::Round((Get-ChildItem wheels/*.whl | Measure-Object Length -Sum).Sum / 1MB, 1)
          Write-Host "Wheels: $wheelCount files, $wheelSize MB"

      - name: Upload offline bundle
        uses: actions/upload-artifact@v4
        with:
          name: offline-bundle
          path: |
            wheels/
            uv.exe
          retention-days: 1

  # ── Package and release ────────────────────────────────
  package:
    name: Package and release
    runs-on: ubuntu-latest
    needs: [build-exe, bundle-offline]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # ── Download artifacts ────────────────────────────
      - name: Download Hermes.exe
        uses: actions/download-artifact@v4
        with:
          name: hermes-exe
          path: launcher/

      - name: Download offline bundle
        uses: actions/download-artifact@v4
        with:
          name: offline-bundle
          path: bundled/

      - name: Verify artifacts
        run: |
          ls -lh launcher/Hermes.exe
          ls -lh bundled/uv.exe
          ls bundled/wheels/ | head -5
          echo "WHEEL_COUNT=$(ls bundled/wheels/*.whl | wc -l)" >> "$GITHUB_ENV"
          echo "EXE_SIZE=$(ls -lh launcher/Hermes.exe | awk '{print $5}')" >> "$GITHUB_ENV"
          echo "BUNDLE_SIZE=$(du -sh bundled/ | awk '{print $1}')" >> "$GITHUB_ENV"

      # ── Package Windows (zip) ─────────────────────────
      - name: Package Windows zip
        run: |
          PKG="hermes-deploy-windows-${{ steps.version.outputs.VERSION }}"
          mkdir -p "dist/$PKG/windows"
          mkdir -p "dist/$PKG/vendor"
          mkdir -p "dist/$PKG/launcher"

          # Install scripts (root + subdirectories)
          cp install.cmd               "dist/$PKG/"
          cp install.ps1               "dist/$PKG/"
          cp windows/install.ps1       "dist/$PKG/windows/"
          cp windows/install.cmd       "dist/$PKG/windows/"
          cp windows/install-extended.ps1 "dist/$PKG/windows/"

          # Offline bundle (wheels + uv)
          cp -r bundled/wheels         "dist/$PKG/"
          cp bundled/uv.exe            "dist/$PKG/"

          # Launcher
          cp launcher/Hermes.exe       "dist/$PKG/launcher/"
          cp launcher/icon.ico         "dist/$PKG/launcher/"
          cp launcher/app_icon.png     "dist/$PKG/launcher/"
          cp launcher/install_shortcut.ps1 "dist/$PKG/launcher/"

          # Source
          cp -r vendor/hermes-agent    "dist/$PKG/vendor/"

          # Docs
          cp README.md                 "dist/$PKG/"

          cd dist
          zip -r "../${PKG}.zip" "$PKG"
          echo "WINDOWS_ZIP=${PKG}.zip" >> "$GITHUB_ENV"

      # ── Package Linux (tar.gz) ─────────────────────────
      - name: Package Linux tar.gz
        run: |
          PKG="hermes-deploy-linux-${{ steps.version.outputs.VERSION }}"
          mkdir -p "dist/$PKG/linux"
          mkdir -p "dist/$PKG/vendor"

          # Install scripts (root + subdirectories)
          cp install.sh "dist/$PKG/"
          chmod +x "dist/$PKG/install.sh"
          cp linux/install.sh "dist/$PKG/linux/"
          chmod +x "dist/$PKG/linux/install.sh"

          # Source
          cp -r vendor/hermes-agent "dist/$PKG/vendor/"

          # Docs
          cp README.md "dist/$PKG/"

          cd dist
          tar -czf "../${PKG}.tar.gz" "$PKG"
          echo "LINUX_TARGZ=${PKG}.tar.gz" >> "$GITHUB_ENV"

      # ── Generate checksums ──────────────────────────────
      - name: Generate checksums
        run: |
          sha256sum "$WINDOWS_ZIP" "$LINUX_TARGZ" > checksums.txt
          cat checksums.txt

      # ── Create GitHub Release ───────────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Hermes Agent One-Click Deploy  v${{ steps.version.outputs.VERSION }}

            ### Downloads

            | Platform | File | Notes |
            |----------|------|-------|
            | Windows 10/11 | `${{ env.WINDOWS_ZIP }}` | Offline install — includes ${{ env.WHEEL_COUNT }} pre-bundled wheels (${{ env.BUNDLE_SIZE }}) + GUI launcher (Hermes.exe ${{ env.EXE_SIZE }}) |
            | Linux / macOS / WSL2 | `${{ env.LINUX_TARGZ }}` | CLI install |

            ### Windows Installation

            **Zero-network install:**
            ```
            1. Download and extract ${{ env.WINDOWS_ZIP }}
            2. Double-click install.cmd
            3. Enter your API key when notepad opens
            4. Restart terminal, run: hermes
            ```
            No internet needed — all Python dependencies are bundled.

            ### Linux / macOS / WSL2 Installation
            ```bash
            tar -xzf ${{ env.LINUX_TARGZ }}
            cd hermes-deploy-linux-${{ steps.version.outputs.VERSION }}
            bash install.sh
            # Reload shell, then: hermes setup
            ```

            ### File Verification (SHA256)

            See attached `checksums.txt`

            ---

            Bundled Hermes Agent version: **v0.12.0**
            Upstream: https://github.com/NousResearch/hermes-agent
          files: |
            ${{ env.WINDOWS_ZIP }}
            ${{ env.LINUX_TARGZ }}
            checksums.txt
          draft: false
          prerelease: false
